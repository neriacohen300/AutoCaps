<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="utf-8">
    <title>AutoCaps</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>AutoCaps</h2>
            <span class="subtitle">תמלול וכתוביות אוטומטיות</span>
        </div>
        
        <details class="collapsible-group" open>
            <summary class="collapsible-header">הגדרות תמלול וכתוביות</summary>
            <div class="collapsible-body">
                
                <div class="section">
                    <div class="section-title">הגדרות פרויקט</div>
                    <div class="field-group">
                        <label for="language">שפת התמלול</label>
                        <select id="language">
                            <option value="he">עברית (Hebrew)</option>
                            <option value="en">אנגלית (English)</option>
                        </select>
                    </div>
                    <div class="field-group">
                        <label for="timelineRange">טווח בטיימליין</label>
                        <select id="timelineRange">
                            <option value="entire">כל הטיימליין (Entire Sequence)</option>
                            <option value="inOut">In/Out בלבד</option>
                        </select>
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">הגדרות כתוביות</div>
                    <div class="field-row">
                        <div class="field-group">
                            <label for="maxWords">מילים בשורה</label>
                            <input type="number" id="maxWords" value="8" min="2">
                        </div>
                        <div class="field-group">
                            <label for="maxLines">שורות בכתובית</label>
                            <input type="number" id="maxLines" value="1" min="1">
                        </div>
                    </div>
                    <label class="checkbox-wrapper" for="removePunctuation">
                        <input type="checkbox" id="removePunctuation">
                        <span class="custom-checkbox"></span>
                        <span class="checkbox-text">הסרת סימני פיסוק (מראה נקי)</span>
                    </label>
                </div>

                <div class="section">
                    <div class="section-title">חומרה ועיבוד</div>
                    <div class="field-group">
                        <label for="deviceSelect">מנוע עיבוד</label>
                        <select id="deviceSelect">
                            <option value="cuda">GPU (NVIDIA CUDA) - מהיר</option>
                            <option value="cpu">CPU (מעבד) - איטי</option>
                        </select>
                    </div>
                </div>

                <div class="action-zone">
                    <button id="btnExport">יצירת כתוביות בטיימליין</button>
                    <div id="status">מוכן לעבודה...</div>
                </div>

            </div>
        </details>

        <details class="collapsible-group">
            <summary class="collapsible-header">חיתוך שקט אוטומטי</summary>
            <div class="collapsible-body">
                
                <div class="section">
                    <div class="section-title">הגדרות חיתוך שקט</div>
                    <div class="field-row">
                        <div class="field-group">
                            <label for="silThreshold">עוצמת רעש (dB)</label>
                            <input type="number" id="silThreshold" value="-35" max="-10">
                        </div>
                        <div class="field-group">
                            <label for="silDuration">אורך שקט (ms)</label>
                            <input type="number" id="silDuration" value="150" min="100">
                        </div>
                        <div class="field-group">
                            <label for="silPad">ריפוד שוליים (ms)</label>
                            <input type="number" id="silPad" value="150" min="0">
                        </div>
                    </div>
                </div>

                <div class="action-zone">
                    <button id="btnCutSilence" style="background-color: #e66a14;">חתוך שקט בטיימליין</button>
                    <div id="statusSilence" style="font-size: 11px; text-align: center; margin-top: 5px; color: var(--text-secondary);">מוכן לחיתוך...</div>
                </div>

            </div>
        </details>

        <details class="collapsible-group">
            <summary class="collapsible-header">עריכת פודקאסט (מעבר מצלמות אוטומטי) - Beta</summary>
            <div class="collapsible-body">

                <div class="section">
                    <div class="section-title">משתתפים</div>
                    <div class="field-group">
                        <label for="podSpeakerCount">כמות משתתפים</label>
                        <select id="podSpeakerCount">
                            <option value="2">2 משתתפים</option>
                            <option value="3">3 משתתפים</option>
                            <option value="4">4 משתתפים</option>
                        </select>
                    </div>
                    <div id="podSpeakersContainer"></div>
                </div>

                <div class="section">
                    <div class="section-title">זווית "כולם ביחד" (אופציונלי)</div>
                    <label class="checkbox-wrapper" for="podUseMaster">
                        <input type="checkbox" id="podUseMaster">
                        <span class="custom-checkbox"></span>
                        <span class="checkbox-text">יש מצלמה נוספת עם כולם ביחד</span>
                    </label>
                    <div class="field-group" id="podMasterTrackWrap" style="display:none; margin-top:8px;">
                        <label for="podMasterVid">מספר טראק וידאו (כולם ביחד)</label>
                        <input type="number" id="podMasterVid" value="1" min="1">
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">הגדרות זיהוי דיבור וקאטים</div>
                    <div class="field-row">
                        <div class="field-group">
                            <label for="podThreshold">רגישות זיהוי קול (dB)
                                <span class="info-icon" tabindex="0" title="כל קול מתחת לערך הזה נחשב שקט. ערך גבוה יותר (למשל 25-) = פחות רגיש לרעשי רקע ומזגן. ערך נמוך יותר (למשל 45-) = תופס גם לחישות.">i</span>
                            </label>
                            <input type="number" id="podThreshold" value="-30" max="-10">
                        </div>
                        <div class="field-group">
                            <label for="podMinSilence">זמן שקט למעבר למאסטר (ms)
                                <span class="info-icon" tabindex="0" title="כמה זמן שקט רציף (במילישניות) נדרש לפני מעבר אוטומטי לזווית 'כולם ביחד', אם הוגדרה. בלי מאסטר - שדה זה לא משפיע.">i</span>
                            </label>
                            <input type="number" id="podMinSilence" value="500" min="100">
                        </div>
                    </div>
                    <div class="field-row">
                        <div class="field-group">
                            <label for="podMarginDb">רף החלפת מצלמה (dB)
                                <span class="info-icon" tabindex="0" title="כמה חזק יותר (בדציבלים) דובר חדש צריך להיות מהדובר הנוכחי כדי 'לגנוב' את המצלמה. ערך גבוה יותר = פחות קפיצות שווא מרעש רקע/בליד מיקרופון בין הדוברים.">i</span>
                            </label>
                            <input type="number" id="podMarginDb" value="4" min="0" step="0.5">
                        </div>
                        <div class="field-group">
                            <label for="podHoldMs">זמן החזקה לפני קאט (ms)
                                <span class="info-icon" tabindex="0" title="כמה זמן (במילישניות) דובר חדש צריך להישאר דומיננטי ברציפות לפני שהמצלמה בפועל עוברת אליו. ערך גבוה יותר = פחות קאטים עצבניים אך תגובה איטית יותר למעברים אמיתיים.">i</span>
                            </label>
                            <input type="number" id="podHoldMs" value="300" min="0" step="50">
                        </div>
                    </div>
                    <div class="field-group">
                        <label for="podMinShot">אורך שוט מינימלי (שניות)
                            <span class="info-icon" tabindex="0" title="רשת ביטחון אחרונה: כל שוט שיוצא קצר מהערך הזה יתמזג אוטומטית עם השוט השכן שלו, כדי למנוע קאטים קצרים מדי.">i</span>
                        </label>
                        <input type="number" id="podMinShot" value="1.2" min="0.2" step="0.1">
                    </div>
                </div>

                <div class="action-zone">
                    <button id="btnPodcastDirector" style="background-color:#7a3ee6;">ערוך פודקאסט אוטומטית</button>
                    <div id="statusPodcast" style="font-size: 11px; text-align: center; margin-top: 5px; color: var(--text-secondary);">מוכן לעריכה...</div>
                    <div id="podcastProgressWrap" class="hidden" style="margin-top:6px;">
                        <div class="progress-track">
                            <div id="barFillPodcast" class="progress-fill"></div>
                        </div>
                        <div id="statusLinePodcast" style="font-size:10px; color: var(--text-secondary); margin-top:4px; text-align:center;"></div>
                    </div>
                </div>

            </div>
        </details>

    </div>

    <script src="js/CSInterface.js"></script>
    <script src="js/config.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
